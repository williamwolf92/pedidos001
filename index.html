<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="styles.css" />
  <title>Carta de Ofertas</title>
</head>
<body>
  <header id="app-header">
    <button id="cart-toggle" aria-label="Abrir carrito">🛒<span id="cart-badge">0</span></button>
    <div class="header-title">Ver Carrito</div>
  </header>

  <!-- Left sidebar cart -->
  <aside id="cart-sidebar" class="cart-collapsed" aria-hidden="true">
    <header class="cart-header">
      <h3>Tu carrito</h3>
    </header>
    <div class="cart-body">
      <ul id="cart-items-list" class="cart-items-list"></ul>
    </div>
    <footer class="cart-footer">
      <div class="cart-total-row">
        <span>Total</span>
        <strong id="cart-total">$ 0.00</strong>
      </div>
      <button id="order-btn" class="btn btn-primary">Ordenar</button>
    </footer>
  </aside>

    <main id="menu-container" aria-live="polite"></main>

  <!-- Modal de Carrito (añadir) -->
  <div id="cart-modal" class="modal-hidden" aria-hidden="true">
    <div class="modal-backdrop" id="cart-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="cart-title">
      <header class="modal-header">
        <h3 id="cart-title">Añadir al carrito</h3>
        <button id="cart-close" class="modal-close" aria-label="Cerrar">✕</button>
      </header>

      <div class="modal-body">
        <div class="item-name" id="cart-item-name"></div>

        <div class="counter-row">
          <button id="counter-decr" class="counter-btn" aria-label="Disminuir">−</button>
          <div id="counter-value" class="counter-value">1</div>
          <button id="counter-incr" class="counter-btn" aria-label="Aumentar">+</button>
        </div>
      </div>

      <footer class="modal-footer">
        <button id="cart-add" class="btn btn-primary">Añadir</button>
        <button id="cart-cancel" class="btn">Cerrar</button>
      </footer>
    </div>
  </div>

  <!-- Ordenar: formulario modal integrado con formly.email -->
  <div id="order-modal" class="modal-hidden" aria-hidden="true">
    <div class="modal-backdrop" id="order-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="order-title">
      <header class="modal-header">
        <h3 id="order-title">Completa tu pedido</h3>
        <button id="order-close" class="modal-close" aria-label="Cerrar">✕</button>
      </header>

      <div class="modal-body">
        <form id="pedidoForm" action="https://formly.email/submit" method="POST">
          <input type="hidden" name="access_key" value="871e30b4464f48868d7928f741fcef3f">
          <div class="form-row">
            <label>Nombre</label>
            <input type="text" name="Nombre" id="cust-name" required />
          </div>
          <div class="form-row">
            <label>Teléfono</label>
            <input type="tel" name="Telefono" id="cust-phone" required />
          </div>
          <div class="form-row">
            <label>Dirección</label>
            <input type="text" name="Direccion" id="cust-address" required />
          </div>

          <div class="form-row">
            <label>Productos pedidos</label>
            <textarea name="Productos" id="form-items" rows="4" readonly></textarea>
          </div>

          <div class="form-row">
            <label>Total a pagar</label>
            <input type="text" name="Pago" id="form-total" readonly />
          </div>

          <footer class="modal-footer">
            <button type="submit" class="btn btn-primary">Enviar pedido</button>
            <button type="button" id="order-cancel" class="btn">Cerrar</button>
          </footer>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal de estado (éxito / error de envío) -->
  <div id="status-modal" class="status-modal status-hidden" aria-hidden="true">
    <div class="status-card" id="status-text"></div>
  </div>

  <script type="module" src="app.js"></script>

<div id="toast">Producto añadido</div>
</body>
</html>
