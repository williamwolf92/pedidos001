<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="styles.css" />
  <title>Carta de Ofertas</title>
</head>
<body>
  <header id="app-header">
    <button id="cart-toggle" aria-label="Abrir carrito">🛒
      <span id="cart-badge" class="cart-badge" aria-hidden="true">0</span>
    </button>
    <div class="header-title">Ver Carrito</div>
  </header>

  <!-- Left sidebar cart -->
  <aside id="cart-sidebar" class="cart-collapsed" aria-hidden="true">
    <header class="cart-header">
      <h3>Tu carrito</h3>
    </header>
    <div class="cart-body">
      <ul id="cart-items-list" class="cart-items-list"></ul>
    </div>
    <footer class="cart-footer">
      <div class="cart-total-row">
        <span>Total</span>
        <strong id="cart-total">$ 0.00</strong>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="cart-close-btn" class="btn">Cerrar</button>
        <button id="order-btn" class="btn btn-primary">Crear pedido</button>
      </div>
    </footer>
  </aside>

    <main id="menu-container" aria-live="polite"></main>

  <!-- Modal de Carrito (añadir) -->
  <div id="cart-modal" class="modal-hidden" aria-hidden="true">
    <div class="modal-backdrop" id="cart-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="cart-title">
      <header class="modal-header">
        <h3 id="cart-title">Añadir al carrito</h3>
        <button id="cart-close" class="modal-close" aria-label="Cerrar">✕</button>
      </header>

      <div class="modal-body">
        <!-- Image placeholder (300x300) -->
        <div style="display:flex;
          justify-content:center;">
          <div style="width:300px;
            height:300px;
            border-radius:8px;
            overflow:hidden;
            background:#f2f2f2;
            display:flex;
            align-items:center;
            justify-content:center;">
            <img id="cart-item-image" src="" alt="" style="width:100%;
              height:100%;
              object-fit:cover;
              display:none;">
            <div id="cart-item-image-placeholder" style="color:#888;
              font-size:13px;
              padding:8px;
              text-align:center;">Sin imagen
            </div>
          </div>
        </div>

        <div class="item-name" id="cart-item-name"></div>

        <div class="counter-row">
          <button id="counter-decr" class="counter-btn" aria-label="Disminuir">−</button>
          <div id="counter-value" class="counter-value">1</div>
          <button id="counter-incr" class="counter-btn" aria-label="Aumentar">+</button>
        </div>
      </div>

      <footer class="modal-footer">
        <button id="cart-add" class="btn btn-primary">Añadir</button>
        <button id="cart-cancel" class="btn">Cerrar</button>
      </footer>
    </div>
  </div>

  <!-- Ordenar: formulario modal integrado con web3forms -->
  <div id="order-modal" class="modal-hidden" aria-hidden="true">
    <div class="modal-backdrop" id="order-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="order-title">
      <header class="modal-header">
        <h3 id="order-title">Completa tu pedido</h3>
        <button id="order-close" class="modal-close" aria-label="Cerrar">✕</button>
      </header>

      <div class="modal-body">
        <form id="pedidoForm" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="df0bb44d-cde2-4012-a7b2-22958889284c">
          <div class="form-row">
            <label>Nombre</label>
            <input type="text" name="Nombre" id="cust-name" placeholder="Introduzca su nombre" required />
          </div>
          <div style="display:flex;gap:8px;">
            <div class="form-row" style="flex:1;">
              <label>Teléfono</label>
              <input type="tel" name="Telefono" id="cust-phone" placeholder="Introduzca su número de teléfono" required />
            </div>
            <div class="form-row" style="flex:1;">
              <label>PIN</label>
              <input
                type="number"
                name="PIN"
                id="cust-pin"
                inputmode="numeric"
                pattern="\d{1,4}"
                min="0"
                max="9999"
                required
                placeholder="Debe tener 4 dígitos"
                oninput="this.value = this.value.replace(/[^0-9]/g,'').slice(0,4);"
              />
            </div>
          </div>

          <div class="form-row">
            <label>Tipo de entrega</label>
            <div style="display:flex;gap:12px;align-items:center;">
              <label style="display:flex;align-items:center;gap:0px;">
                <input style="margin-bottom:4px;" type="radio" name="Entrega" value="Tienda" />Ir a la tienda
              </label>
              <label style="display:flex;align-items:center;gap:0px;">
                <input style="margin-bottom:4px;" type="radio" name="Entrega" value="Domicilio" />Traer a domicilio
              </label>
            </div>
          </div>

          <div class="form-row">
            <label>Dirección (sólo si pide domicilio)</label>
            <input type="text" name="Direccion" id="cust-address" placeholder="Por favor, especifique bien su dirección" disabled />
          </div>

          <div class="form-row">
            <label>Productos pedidos</label>
            <textarea name="Productos" id="form-items" rows="4" readonly></textarea>
          </div>

          <div style="display:flex;gap:8px;">
            <div class="form-row" style="flex:1;width:30px;">
              <label>Total a pagar</label>
              <input type="text" name="Total a pagar" id="form-total" readonly />
            </div>
            <div class="form-row" style="flex:1;">
              <label>Fecha y hora</label>
              <input
                type="text"
                name="Fecha y hora"
                id="form-datetime"
                readonly
                aria-readonly="true"
                placeholder="D/M/AAAA - h:mm am/pm"
              />
            </div>
          </div>

          <footer class="modal-footer">
            <button type="submit" class="btn btn-primary">Enviar pedido</button>
            <button type="button" id="order-cancel" class="btn">Cerrar</button>
          </footer>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal de estado (éxito / error de envío) -->
  <div id="status-modal" class="status-modal status-hidden" aria-hidden="true">
    <div class="status-card" id="status-text"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
