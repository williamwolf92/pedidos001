<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedido Restaurante</title>

<style>

body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#fff3e6,#ffe0cc);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0;
}

.container{
  width:100%;
  max-width:420px;
}

h1{
  text-align:center;
  color:#d35400;
  margin-bottom:20px;
}

form{
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

input, textarea{
  width:100%;
  margin-bottom:14px;
  padding:12px;
  border-radius:6px;
  border:1px solid #ddd;
  font-size:15px;
  box-sizing:border-box;
  transition:0.2s;
}

input:focus, textarea:focus{
  border-color:#d35400;
  outline:none;
  box-shadow:0 0 4px rgba(211,84,0,0.3);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#d35400;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:0.2s;
}

button:hover{
  background:#e67e22;
}

button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

.spinner{
  width:16px;
  height:16px;
  border:3px solid rgba(255,255,255,0.4);
  border-top:3px solid white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  display:none;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

#status{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}

.success{
  color:#27ae60;
}

.error{
  color:#e74c3c;
}

</style>
</head>

<body>

<div class="container">

<h1>Haz tu pedido</h1>

<form id="pedidoForm" action="https://formly.email/submit" method="POST">

<input type="hidden" name="access_key" value="f214174db1774f02a0815c17424f751a">

<input type="text" name="Nombre" placeholder="Nombre" required>
<input type="tel" name="Numero" placeholder="Número" required>
<input type="text" name="Direccion" placeholder="Dirección" required>
<input type="text" name="Transaccion" placeholder="Transacción" required>
<textarea name="Pedido" placeholder="¿Qué va a pedir?" required></textarea>

<button type="submit">
  <span id="btnText">Enviar Pedido</span>
  <div class="spinner" id="spinner"></div>
</button>

</form>

<p id="status"></p>

</div>

<script>

const form = document.getElementById('pedidoForm');
const status = document.getElementById('status');

const spinner = document.getElementById("spinner");
const btnText = document.getElementById("btnText");
const button = form.querySelector("button");

form.addEventListener('submit', async function(e) {

e.preventDefault();

spinner.style.display="block";
btnText.textContent="Enviando...";
button.disabled=true;

const formData = new FormData(form);

try{

const response = await fetch(form.action,{
method:form.method,
body:formData,
});

if(response.ok){

status.textContent="¡Pedido enviado con éxito!";
status.className="success";

form.reset();

}else{

status.textContent="Error al enviar el pedido. Intenta nuevamente.";
status.className="error";

}

}catch(err){

status.textContent="Error al enviar el pedido. Verifica tu conexión.";
status.className="error";

console.error(err);

}

spinner.style.display="none";
btnText.textContent="Enviar Pedido";
button.disabled=false;

});

</script>

</body>
</html>
